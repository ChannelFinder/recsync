include:
  - docker/cf-compose.yml
services:
  recc:
    build: .
    depends_on:
      cf:
        condition: service_healthy
        restart: true
    healthcheck:
      test: netstat | grep cf
      interval: 10s
      timeout: 30s
      retries: 3
    environment:
      RECCEIVER_PROCS: cf
      RECCEIVER_LOGLEVEL: DEBUG
      RECCEIVER_INFOTAGS: archive
      RECCEIVER_ALIAS: "True"
      RECCEIVER_RECORDTYPE: "True"
      RECCEIVER_RECORDDESC: "True"
      RECCEIVER_CLEANONSTART: "True"
      RECCEIVER_USERNAME: admin
    volumes:
      - type: bind
        source: docker/config/cf.conf
        target: /home/recceiver/channelfinderapi.conf
        read_only: true
    networks:
      - net-1-recc-1
      - net-2-cf

networks:
  net-1-recc-1:
    driver: bridge
